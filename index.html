<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario kellyka verga</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
 
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <h1>¡Contáctanos!</h1>
        <p class="subtitle">Tus respuestas se guardarán directamente en nuestra base de datos.</p>
        
        <form id="questionnaireForm">
            <div class="form-group">
                <label for="name">Nombre Completo</label>
                <input type="text" id="name" name="name" placeholder="Tu nombre" required>
            </div>
            
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="tu@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="message">Mensaje / Respuesta</label>
                <textarea id="message" name="message" rows="4" placeholder="Escribe algo aquí..." required></textarea>
            </div>
            
            <button type="submit" id="submitBtn">
                <div class="loader"></div>
                <span>Enviar Respuestas</span>
            </button>
        </form>
        
        <div id="statusMsg" class="status-message"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
